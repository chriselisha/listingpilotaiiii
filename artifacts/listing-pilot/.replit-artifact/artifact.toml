kind = "web"
previewPath = "/"
title = "ListingPilot AI"
version = "1.0.0"
id = "artifacts/listing-pilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22157
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/listing-pilot run dev"

[services.env]
PORT = "22157"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/listing-pilot", "run", "build"]
publicDir = "artifacts/listing-pilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
